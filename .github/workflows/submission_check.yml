name: Manual Issue Checklist

on:
  issues:
    types: [opened]

jobs:
  manual-issue-checklist:
    if: github.event.repository.name == 'Workshop_Template'
    runs-on: ubuntu-latest

    permissions:
      issues: write

    steps:
      - name: Post checklist on manual issues
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const repo = context.repo;
            const body = issue.body ?? "";
            const title = issue.title ?? "";

            const isAutoGenerated =
              body.includes("_This issue was automatically created for tracking purposes._") ||
              /^Submission for PR #\d+ in .+\/.+:/.test(title);

            if (isAutoGenerated) {
              core.info("Skipping auto-generated PR tracking issue.");
              return;
            }

            const checklist = [
              "## Workshop Submission Checklist",
              "",
              `**Issue:** ${issue.html_url}`,
              `**Author:** @${issue.user.login}`,
              "",
              "Please confirm the following before requesting review:",
              "",
              "- [ ] You have read the [workshop submission guidelines](https://github.com/Workshop_Template/)",
              "- [ ] You have included a README outlining the workshop and its contents",
              "- [ ] You have included requirements and setup instructions in the README.md",
              "- [ ] You have tested the workshop exercises and data sets",
              "- [ ] You have organized your repo to match the workshop template structure",
              "- [ ] You have included a pdf copy of your slides to facilitate review",
              "- [ ] All changes or contributions are clearly explained in the issue description",
              "",
              "Reply to this comment or check off the boxes when complete."
            ].join("\n");

            await github.rest.issues.createComment({
              owner: repo.owner,
              repo: repo.repo,
              issue_number: issue.number,
              body: checklist
            });
